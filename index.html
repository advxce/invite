<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Идем гулять?</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fef9e7 0%, #f9e79f 40%, #a9dfbf 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            z-index: 0;
        }
        body::before { width: 300px; height: 300px; top: -50px; right: -50px; background: rgba(241, 196, 15, 0.3); }
        body::after { width: 400px; height: 400px; bottom: -100px; left: -100px; background: rgba(46, 204, 113, 0.2); }

        .container {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            text-align: center;
            max-width: 450px;
            width: 90%;
            z-index: 1;
            transition: transform 0.3s ease;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            min-height: 60px;
            position: relative;
        }

        button {
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .btn-yes {
            background: #2ecc71;
            color: white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-yes:hover {
            background: #27ae60;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
        }

        /* Убегающая кнопка */
        .btn-no {
            background: #e74c3c;
            color: white;
            /* Изменяем позиционирование на absolute при первом же "шухере" */
            position: relative; 
            z-index: 10;
            transition: all 0.1s ease-out; /* Очень быстрый побег */
        }

        .sad-text {
            margin-top: 20px;
            color: #c0392b;
            font-weight: bold;
            font-size: 1.2rem;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }
        .sad-text.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Экран 2: Дни недели */
        .hidden {
            display: none !important;
        }

        .days-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }

        .day-btn {
            background: #fff;
            color: #34495e;
            border: 2px solid #bdc3c7;
            text-align: left;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        .day-btn:hover {
            border-color: #3498db;
            background: #f4f6f7;
        }

        .day-btn.selected {
            background: #3498db;
            color: white;
            border-color: #2980b9;
            transform: scale(1.02);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(52, 152, 219, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(52, 152, 219, 0); }
            100% { box-shadow: 0 0 0 0 rgba(52, 152, 219, 0); }
        }

        .btn-ready {
            width: 100%;
            background: #f1c40f;
            color: #2c3e50;
            margin-top: 15px;
            transition: all 0.3s ease;
        }
        .btn-ready:hover {
            background: #f39c12;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(241, 196, 15, 0.4);
        }
        .btn-ready:disabled {
            background: #bdc3c7;
            color: #7f8c8d;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: Приглашение -->
    <div id="screen-invite" class="container">
        <h1>Доброго времени суток! Когда идем за чаем? ☀️</h1>
        <div class="btn-group">
            <button class="btn-yes" onclick="goToSecondScreen()">Пойду!</button>
            <!-- Добавили события наведения мыши и касания для телефонов -->
            <button id="runaway-btn" class="btn-no" onmouseover="runAway()" onclick="runAway()" ontouchstart="runAway()">Не пойду</button>
        </div>
        <div id="sad-message" class="sad-text">так не пойдет -_-</div>
    </div>

    <!-- ЭКРАН 2: Выбор даты -->
    <div id="screen-date" class="container hidden">
        <h1>Выбери день 📅</h1>
        <div class="days-grid">
            <button class="day-btn" onclick="selectDay(this, 'Понедельник, 06.07.2026')"><span>Понедельник</span> <b>06.07.2026</b></button>
            <button class="day-btn" onclick="selectDay(this, 'Вторник, 07.07.2026')"><span>Вторник</span> <b>07.07.2026</b></button>
            <button class="day-btn" onclick="selectDay(this, 'Среда, 08.07.2026')"><span>Среда</span> <b>08.07.2026</b></button>
            <button class="day-btn" onclick="selectDay(this, 'Четверг, 09.07.2026')"><span>Четверг</span> <b>09.07.2026</b></button>
            <button class="day-btn" onclick="selectDay(this, 'Пятница, 10.07.2026')"><span>Пятница</span> <b>10.07.2026</b></button>
            <button class="day-btn" onclick="selectDay(this, 'Суббота, 11.07.2026')"><span>Суббота</span> <b>11.07.2026</b></button>
            <button class="day-btn" onclick="selectDay(this, 'Воскресенье, 12.07.2026')"><span>Воскресенье</span> <b>12.07.2026</b></button>
        </div>
        <button id="ready-btn" class="btn-ready" disabled onclick="sendEmail()">Готово ✅</button>
    </div>

    <script>
        let selectedDate = "";

        // Функция побега кнопки
        function runAway() {
            const btn = document.getElementById('runaway-btn');
            const sadMessage = document.getElementById('sad-message');
            
            // Показываем надпись "так не пойдет" при первой же попытке нажать
            sadMessage.classList.add('show');
            
            // Делаем позиционирование фиксированным, чтобы кнопка летала по всему экрану
            btn.style.position = 'fixed';
            
            // Вычисляем случайные координаты с учетом размеров самой кнопки
            const btnWidth = btn.offsetWidth;
            const btnHeight = btn.offsetHeight;
            
            // Ограничиваем область, чтобы кнопка не улетала за границы экрана
            const maxX = window.innerWidth - btnWidth - 20;
            const maxY = window.innerHeight - btnHeight - 20;
            
            const randomX = Math.max(20, Math.floor(Math.random() * maxX));
            const randomY = Math.max(20, Math.floor(Math.random() * maxY));
            
            // Задаем новые координаты
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        function goToSecondScreen() {
            document.getElementById('screen-invite').classList.add('hidden');
            document.getElementById('screen-date').classList.remove('hidden');
        }

        function selectDay(buttonElement, dateString) {
            document.querySelectorAll('.day-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            
            buttonElement.classList.add('selected');
            selectedDate = dateString;
            document.getElementById('ready-btn').disabled = false;
        }

        function sendEmail() {
            const readyBtn = document.getElementById('ready-btn');
            readyBtn.innerText = "Отправка...";
            readyBtn.disabled = true;

            fetch("https://api.web3forms.com/submit", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Accept": "application/json"
                },
                body: JSON.stringify({
                    access_key: "83e34218-e1e2-4f24-81f3-5b587e60b389",
                    subject: "Ура! Выбрана дата для прогулки!",
                    to: "poznyak.dima2018@gmail.com", 
                    message: `Отличные новости! Ответ: ПОЙДУ. Выбранная дата: ${selectedDate}`
                })
            })
            .then(response => {
                if(response.ok) {
                    alert(`Успешно отправлено! Выбранный день: ${selectedDate}`);
                    readyBtn.innerText = "Отправлено! 🎉";
                } else {
                    alert("Что-то пошло не так. Попробуй еще раз.");
                    readyBtn.innerText = "Готово ✅";
                    readyBtn.disabled = false;
                }
            })
            .catch(error => {
                console.error(error);
                alert("Ошибка сети при отправке формы.");
                readyBtn.innerText = "Готово ✅";
                readyBtn.disabled = false;
            });
        }
    </script>
</body>
</html>
